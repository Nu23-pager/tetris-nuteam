<!DOCTYPE html>
<html>
<head>
<title>Tetris Nuteam</title>
<style>
body{
background:#111;
color:white;
text-align:center;
font-family:Arial;
}
canvas{
background:#222;
margin-top:20px;
}
</style>
</head>

<body>

<h1>Tetris Nuteam</h1>

<canvas id="game" width="200" height="400"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const grid = 20;
const rows = 20;
const cols = 10;

let board = Array.from({length:rows},()=>Array(cols).fill(0));

let piece = {
shape:[[1,1,1],[0,1,0]],
x:4,
y:0
};

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

for(let y=0;y<rows;y++){
for(let x=0;x<cols;x++){
if(board[y][x]){
ctx.fillStyle="white";
ctx.fillRect(x*grid,y*grid,grid-1,grid-1);
}
}
}

ctx.fillStyle="white";
piece.shape.forEach((row,y)=>{
row.forEach((value,x)=>{
if(value){
ctx.fillRect((piece.x+x)*grid,(piece.y+y)*grid,grid-1,grid-1);
}
});
});

}

function update(){
piece.y++;

if(piece.y>18){
piece.y=0;
}

draw();
}

setInterval(update,500);

</script>

</body>
</html>
