<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tetris Nuteam</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg1: #0b0b0d;
      --bg2: #111115;
      --panel1: #17171c;
      --panel2: #101015;
      --line: #34343d;
      --steel: #575762;
      --steel2: #44444d;
      --concrete1: #2a2a31;
      --concrete2: #23232a;
      --text: #f3f3f3;
      --muted: #a7a7b0;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      color: var(--text);
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(255,255,255,0.03), transparent 18%),
        radial-gradient(circle at 82% 22%, rgba(255,255,255,0.02), transparent 20%),
        radial-gradient(circle at 28% 80%, rgba(255,255,255,0.02), transparent 18%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 100%);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 10px 10px 18px;
    }

    .wrap {
      width: 100%;
      max-width: 390px;
      text-align: center;
      position: relative;
    }

    h1 {
      margin: 2px 0 10px;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.5px;
      color: #f6f6f6;
      text-shadow:
        0 2px 0 rgba(255,255,255,0.05),
        0 8px 18px rgba(0,0,0,0.45);
    }

    .panel {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      padding: 12px;
      border: 1px solid #2e2e36;
      background:
        repeating-linear-gradient(
          125deg,
          rgba(255,255,255,0.015) 0px,
          rgba(255,255,255,0.015) 4px,
          rgba(0,0,0,0.015) 4px,
          rgba(0,0,0,0.015) 10px
        ),
        linear-gradient(180deg, #19191f 0%, #111116 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        inset 0 -1px 0 rgba(0,0,0,0.28),
        0 14px 30px rgba(0,0,0,0.38);
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 10% 15%, rgba(255,255,255,0.02) 0 2px, transparent 2.5px),
        radial-gradient(circle at 80% 28%, rgba(255,255,255,0.018) 0 2px, transparent 3px),
        radial-gradient(circle at 26% 78%, rgba(255,255,255,0.02) 0 1.5px, transparent 2.5px),
        linear-gradient(180deg, rgba(255,255,255,0.015), transparent 30%);
      opacity: 0.8;
    }

    .topbar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .info {
      position: relative;
      overflow: hidden;
      border-radius: 14px;
      padding: 8px;
      border: 1px solid #2f2f37;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.01) 0px,
          rgba(255,255,255,0.01) 2px,
          rgba(0,0,0,0.01) 2px,
          rgba(0,0,0,0.01) 6px
        ),
        linear-gradient(180deg, #1b1b21, #15151a);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.035),
        inset 0 -1px 0 rgba(0,0,0,0.25);
    }

    .label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .value {
      font-size: 18px;
      font-weight: 800;
      color: #fff;
    }

    .canvas-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto;
      position: relative;
    }

    canvas {
      width: min(100%, 280px);
      height: auto;
      max-height: 54vh;
      display: block;
      margin: 0 auto;
      border-radius: 18px;
      border: 3px solid #555560;
      background: linear-gradient(180deg, #2a2a31 0%, #202027 100%);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,0.03),
        inset 0 0 40px rgba(0,0,0,0.22),
        0 10px 24px rgba(0,0,0,0.32);
    }

    .message {
      margin-top: 8px;
      min-height: 22px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
    }

    .controls {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    button {
      position: relative;
      overflow: hidden;
      border: 1px solid #484851;
      border-radius: 14px;
      padding: 12px 8px;
      background:
        repeating-linear-gradient(
          135deg,
          rgba(255,255,255,0.015) 0px,
          rgba(255,255,255,0.015) 4px,
          rgba(0,0,0,0.015) 4px,
          rgba(0,0,0,0.015) 10px
        ),
        linear-gradient(180deg, #4b4b55, #34343d);
      color: #f7f7f7;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        inset 0 -1px 0 rgba(0,0,0,0.35),
        0 4px 12px rgba(0,0,0,0.18);
    }

    button:active {
      transform: scale(0.985);
    }

    .wide {
      grid-column: span 3;
      background:
        repeating-linear-gradient(
          135deg,
          rgba(255,255,255,0.018) 0px,
          rgba(255,255,255,0.018) 4px,
          rgba(0,0,0,0.018) 4px,
          rgba(0,0,0,0.018) 10px
        ),
        linear-gradient(180deg, #575761, #3e3e47);
    }

    .toggle-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .sound-btn {
      flex: 1;
      padding: 10px 8px;
      font-size: 14px;
    }

    .help {
      margin-top: 10px;
      color: #9d9da7;
      font-size: 12px;
      line-height: 1.4;
    }

    .ending-overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.04), rgba(0,0,0,0.75) 45%, rgba(0,0,0,0.93) 100%);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 50;
    }

    .ending-overlay.show {
      display: flex;
      animation: fadeIn 0.8s ease;
    }

    .ending-card {
      width: 100%;
      max-width: 390px;
      border-radius: 24px;
      padding: 18px 16px 16px;
      position: relative;
      overflow: hidden;
      border: 1px solid #44444e;
      background:
        repeating-linear-gradient(
          135deg,
          rgba(255,255,255,0.018) 0px,
          rgba(255,255,255,0.018) 4px,
          rgba(0,0,0,0.018) 4px,
          rgba(0,0,0,0.018) 10px
        ),
        linear-gradient(180deg, #1c1c22, #101015);
      box-shadow:
        0 20px 50px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .ending-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,0.06), transparent 22%),
        radial-gradient(circle at 20% 78%, rgba(255,255,255,0.025), transparent 18%),
        radial-gradient(circle at 78% 72%, rgba(255,255,255,0.02), transparent 18%);
      opacity: 0.9;
    }

    .ending-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
      text-shadow: 0 4px 14px rgba(0,0,0,0.4);
    }

    .ending-sub {
      color: #ccccd3;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .ending-scene {
      position: relative;
      height: 280px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #4a4a53;
      background:
        linear-gradient(180deg, #1f1f26 0%, #141419 100%);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.03),
        inset 0 -40px 70px rgba(0,0,0,0.35);
      margin-bottom: 14px;
    }

    .dust {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      filter: blur(6px);
      animation: floatDust linear infinite;
    }

    .brick {
      position: absolute;
      width: 34px;
      height: 18px;
      border-radius: 4px;
      background:
        linear-gradient(180deg, #8c8c92, #68686f);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 4px 10px rgba(0,0,0,0.3);
      opacity: 0;
      animation: brickRise 1s forwards;
    }

    .statue-placeholder {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) scale(0.9);
      width: 120px;
      height: 190px;
      opacity: 0;
      animation: revealStatue 1.6s forwards 1.1s;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.4));
    }

    .pedestal {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 120px;
      height: 24px;
      border-radius: 6px 6px 10px 10px;
      background: linear-gradient(180deg, #8b8b92, #5d5d65);
    }

    .body-shape {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      width: 82px;
      height: 150px;
      background: linear-gradient(180deg, #d4d4d8, #8f8f95 70%, #77777f);
      clip-path: polygon(
        48% 0%, 60% 5%, 68% 16%, 66% 28%, 72% 36%, 74% 49%,
        67% 61%, 67% 77%, 74% 100%, 57% 100%, 50% 82%, 43% 100%,
        26% 100%, 34% 77%, 33% 61%, 26% 49%, 28% 36%, 34% 28%,
        32% 16%, 40% 5%
      );
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .crack-line {
      position: absolute;
      background: rgba(60,60,68,0.55);
      border-radius: 4px;
    }

    .ending-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .ending-note {
      margin-top: 12px;
      color: #bcbcc4;
      font-size: 12px;
      line-height: 1.45;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes floatDust {
      from {
        transform: translateY(16px) translateX(0px);
        opacity: 0;
      }
      20% { opacity: 0.8; }
      to {
        transform: translateY(-120px) translateX(18px);
        opacity: 0;
      }
    }

    @keyframes brickRise {
      0% {
        transform: translateY(30px) scale(0.8) rotate(8deg);
        opacity: 0;
      }
      60% {
        opacity: 1;
      }
      100% {
        transform: translateY(0) scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    @keyframes revealStatue {
      0% {
        opacity: 0;
        transform: translateX(-50%) scale(0.86);
      }
      60% {
        opacity: 1;
      }
      100% {
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }
    }

    @media (max-height: 740px) {
      h1 {
        font-size: 25px;
        margin: 2px 0 8px;
      }

      .panel {
        padding: 10px;
      }

      canvas {
        width: min(100%, 260px);
        max-height: 50vh;
      }

      button {
        padding: 11px 8px;
        font-size: 14px;
      }

      .controls {
        gap: 7px;
        margin-top: 10px;
      }

      .help {
        font-size: 11px;
        margin-top: 8px;
      }

      .ending-scene {
        height: 250px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Tetris Nuteam</h1>

    <div class="panel">
      <div class="topbar">
        <div class="info">
          <div class="label">คะแนน</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="info">
          <div class="label">เลเวล</div>
          <div class="value" id="level">1</div>
        </div>
        <div class="info">
          <div class="label">แถว</div>
          <div class="value" id="lines">0</div>
        </div>
      </div>

      <div class="canvas-wrap">
        <canvas id="game" width="300" height="600"></canvas>
      </div>

      <div class="message" id="message"></div>

      <div class="controls">
        <button id="leftBtn">◀ ซ้าย</button>
        <button id="rotateBtn">⟳ หมุน</button>
        <button id="rightBtn">ขวา ▶</button>
        <button class="wide" id="downBtn">▼ ลงเร็ว</button>
        <button class="wide" id="restartBtn">เริ่มใหม่</button>
      </div>

      <div class="toggle-row">
        <button class="sound-btn" id="soundBtn">🔊 เสียง: เปิด</button>
      </div>

      <div class="help">
        Level 1–23 • คีย์บอร์ด: ← → ขยับ, ↑ หมุน, ↓ ลงเร็ว
      </div>
    </div>
  </div>

  <div class="ending-overlay" id="endingOverlay">
    <div class="ending-card">
      <div class="ending-title">ไซต์สุดท้ายถูกพิชิตแล้ว</div>
      <div class="ending-sub">
        เศษอิฐและฝุ่นจากสนามสุดท้ายกำลังก่อตัวเป็นผลงานปลายทางของผู้ชนะ
      </div>

      <div class="ending-scene" id="endingScene">
        <div class="brick" style="left:18%; bottom:38px; animation-delay:0.1s;"></div>
        <div class="brick" style="left:28%; bottom:60px; animation-delay:0.2s;"></div>
        <div class="brick" style="left:38%; bottom:84px; animation-delay:0.35s;"></div>
        <div class="brick" style="left:50%; bottom:108px; animation-delay:0.5s;"></div>
        <div class="brick" style="left:61%; bottom:84px; animation-delay:0.7s;"></div>
        <div class="brick" style="left:69%; bottom:58px; animation-delay:0.9s;"></div>

        <div class="dust" style="width:46px;height:46px;left:18%;bottom:30px;animation-duration:4s;animation-delay:0.2s;"></div>
        <div class="dust" style="width:30px;height:30px;left:28%;bottom:70px;animation-duration:3.5s;animation-delay:0.9s;"></div>
        <div class="dust" style="width:38px;height:38px;left:58%;bottom:50px;animation-duration:4.2s;animation-delay:0.6s;"></div>
        <div class="dust" style="width:24px;height:24px;left:72%;bottom:92px;animation-duration:3.2s;animation-delay:1.1s;"></div>
        <div class="dust" style="width:34px;height:34px;left:44%;bottom:120px;animation-duration:3.7s;animation-delay:1.4s;"></div>

        <div class="statue-placeholder">
          <div class="body-shape"></div>
          <div class="pedestal"></div>
          <div class="crack-line" style="left:50%; top:36px; width:3px; height:90px; transform:rotate(8deg);"></div>
          <div class="crack-line" style="left:40%; top:88px; width:26px; height:3px; transform:rotate(-24deg);"></div>
          <div class="crack-line" style="left:57%; top:104px; width:22px; height:3px; transform:rotate(28deg);"></div>
        </div>
      </div>

      <div class="ending-actions">
        <button id="replayEndingBtn">ดูฉากจบอีกครั้ง</button>
        <button id="restartFromEndingBtn">เริ่มใหม่</button>
      </div>

      <div class="ending-note">
        ตอนนี้เป็นฉากจบต้นแบบก่อน ขั้นถัดไปเราค่อยเลือกว่าจะเปลี่ยนเป็นประติมากรรมแบบใด
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");
    const linesEl = document.getElementById("lines");
    const messageEl = document.getElementById("message");
    const soundBtn = document.getElementById("soundBtn");
    const endingOverlay = document.getElementById("endingOverlay");
    const replayEndingBtn = document.getElementById("replayEndingBtn");
    const restartFromEndingBtn = document.getElementById("restartFromEndingBtn");

    const COLS = 10;
    const ROWS = 20;
    const BLOCK = 30;
    const MAX_LEVEL = 23;
    const LINES_PER_LEVEL = 5;

    const LEVEL_SPEEDS = [
      0,
      900, 820, 750, 690, 630, 570, 520, 470, 430, 390, 350,
      320, 290, 260, 230, 205, 180, 160, 140, 120, 105, 92, 80
    ];

    const COLORS = {
      1: "#d6d6d6",
      2: "#c5c5c5",
      3: "#b4b4b4",
      4: "#a4a4a4",
      5: "#949494",
      6: "#858585",
      7: "#ececec"
    };

    const SHAPES = [
      [[1,1,1,1]],
      [[2,2],[2,2]],
      [[0,3,0],[3,3,3]],
      [[0,4,4],[4,4,0]],
      [[5,5,0],[0,5,5]],
      [[6,0,0],[6,6,6]],
      [[0,0,7],[7,7,7]]
    ];

    let board;
    let piece;
    let score;
    let level;
    let totalLines;
    let gameOver;
    let gameWon;
    let dropCounter;
    let dropInterval;
    let lastTime;
    let soundEnabled = true;
    let audioCtx = null;

    function ensureAudio() {
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) audioCtx = new AC();
      }
      if (audioCtx && audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function noiseBuffer(duration = 0.1) {
      const sr = audioCtx.sampleRate;
      const buffer = audioCtx.createBuffer(1, sr * duration, sr);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      return buffer;
    }

    function playImpact(type = "move") {
      if (!soundEnabled) return;
      ensureAudio();
      if (!audioCtx) return;

      const now = audioCtx.currentTime;

      if (type === "move") {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();

        osc.type = "square";
        osc.frequency.setValueAtTime(140, now);
        osc.frequency.exponentialRampToValueAtTime(95, now + 0.06);

        filter.type = "lowpass";
        filter.frequency.setValueAtTime(380, now);

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.12, now + 0.004);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(now);
        osc.stop(now + 0.085);
      }

      if (type === "rotate") {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();

        osc.type = "triangle";
        osc.frequency.setValueAtTime(180, now);
        osc.frequency.exponentialRampToValueAtTime(260, now + 0.05);

        filter.type = "bandpass";
        filter.frequency.setValueAtTime(500, now);

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.11, now + 0.004);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(now);
        osc.stop(now + 0.09);
      }

      if (type === "drop" || type === "clear" || type === "gameover" || type === "win") {
        const source = audioCtx.createBufferSource();
        const buffer = noiseBuffer(type === "gameover" ? 0.28 : type === "win" ? 0.18 : 0.12);
        const filter = audioCtx.createBiquadFilter();
        const gain = audioCtx.createGain();

        source.buffer = buffer;

        if (type === "drop") {
          filter.type = "bandpass";
          filter.frequency.setValueAtTime(130, now);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(0.28, now + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);

          const osc = audioCtx.createOscillator();
          const oscGain = audioCtx.createGain();
          osc.type = "sine";
          osc.frequency.setValueAtTime(90, now);
          osc.frequency.exponentialRampToValueAtTime(60, now + 0.1);
          oscGain.gain.setValueAtTime(0.0001, now);
          oscGain.gain.exponentialRampToValueAtTime(0.08, now + 0.01);
          oscGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
          osc.connect(oscGain);
          oscGain.connect(audioCtx.destination);
          osc.start(now);
          osc.stop(now + 0.12);
        }

        if (type === "clear") {
          filter.type = "bandpass";
          filter.frequency.setValueAtTime(280, now);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(0.26, now + 0.008);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.15);

          const osc = audioCtx.createOscillator();
          const oscGain = audioCtx.createGain();
          osc.type = "sawtooth";
          osc.frequency.setValueAtTime(170, now);
          osc.frequency.exponentialRampToValueAtTime(390, now + 0.12);
          oscGain.gain.setValueAtTime(0.0001, now);
          oscGain.gain.exponentialRampToValueAtTime(0.08, now + 0.01);
          oscGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.13);
          osc.connect(oscGain);
          oscGain.connect(audioCtx.destination);
          osc.start(now);
          osc.stop(now + 0.14);
        }

        if (type === "gameover") {
          filter.type = "lowpass";
          filter.frequency.setValueAtTime(140, now);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(0.3, now + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.26);

          const osc = audioCtx.createOscillator();
          const oscGain = audioCtx.createGain();
          osc.type = "sawtooth";
          osc.frequency.setValueAtTime(110, now);
          osc.frequency.exponentialRampToValueAtTime(55, now + 0.22);
          oscGain.gain.setValueAtTime(0.0001, now);
          oscGain.gain.exponentialRampToValueAtTime(0.08, now + 0.02);
          oscGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
          osc.connect(oscGain);
          oscGain.connect(audioCtx.destination);
          osc.start(now);
          osc.stop(now + 0.24);
        }

        if (type === "win") {
          filter.type = "bandpass";
          filter.frequency.setValueAtTime(420, now);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(0.22, now + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);

          [280, 360, 480].forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const oscGain = audioCtx.createGain();
            osc.type = "triangle";
            osc.frequency.setValueAtTime(freq, now + i * 0.03);
            oscGain.gain.setValueAtTime(0.0001, now + i * 0.03);
            oscGain.gain.exponentialRampToValueAtTime(0.05, now + 0.04 + i * 0.03);
            oscGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.14 + i * 0.03);
            osc.connect(oscGain);
            oscGain.connect(audioCtx.destination);
            osc.start(now + i * 0.03);
            osc.stop(now + 0.16 + i * 0.03);
          });
        }

        source.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        source.start(now);
      }
    }

    function createBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    }

    function randomPiece() {
      const shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
      return {
        shape: shape.map(row => [...row]),
        x: Math.floor(COLS / 2) - Math.ceil(shape[0].length / 2),
        y: 0
      };
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function hexToRgb(hex) {
      const clean = hex.replace("#", "");
      const bigint = parseInt(clean, 16);
      return {
        r: (bigint >> 16) & 255,
        g: (bigint >> 8) & 255,
        b: bigint & 255
      };
    }

    function rgbToHex(r, g, b) {
      return "#" + [r, g, b].map(v => v.toString(16).padStart(2, "0")).join("");
    }

    function lighten(hex, amt) {
      const { r, g, b } = hexToRgb(hex);
      return rgbToHex(
        clamp(r + amt, 0, 255),
        clamp(g + amt, 0, 255),
        clamp(b + amt, 0, 255)
      );
    }

    function darken(hex, amt) {
      const { r, g, b } = hexToRgb(hex);
      return rgbToHex(
        clamp(r - amt, 0, 255),
        clamp(g - amt, 0, 255),
        clamp(b - amt, 0, 255)
      );
    }

    function drawCell(x, y, value) {
      const px = x * BLOCK;
      const py = y * BLOCK;

      const grad = ctx.createLinearGradient(px, py, px + BLOCK, py + BLOCK);
      grad.addColorStop(0, lighten(COLORS[value], 28));
      grad.addColorStop(0.45, COLORS[value]);
      grad.addColorStop(1, darken(COLORS[value], 34));

      ctx.fillStyle = grad;
      ctx.fillRect(px, py, BLOCK - 1, BLOCK - 1);

      ctx.fillStyle = "rgba(255,255,255,0.1)";
      ctx.fillRect(px + 3, py + 3, BLOCK - 10, 3);

      ctx.strokeStyle = "rgba(0,0,0,0.26)";
      ctx.lineWidth = 1;
      ctx.strokeRect(px + 0.5, py + 0.5, BLOCK - 2, BLOCK - 2);

      ctx.fillStyle = "rgba(255,255,255,0.02)";
      for (let i = 0; i < 6; i++) {
        const rx = px + ((i * 5 + x * 3 + y * 2) % (BLOCK - 6)) + 2;
        const ry = py + ((i * 7 + x * 2 + y * 5) % (BLOCK - 6)) + 2;
        ctx.fillRect(rx, ry, 1.2, 1.2);
      }
    }

    function drawBoard() {
      const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      bgGrad.addColorStop(0, "#2a2a31");
      bgGrad.addColorStop(1, "#202027");
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const px = x * BLOCK;
          const py = y * BLOCK;

          if (board[y][x]) {
            drawCell(x, y, board[y][x]);
          } else {
            ctx.fillStyle = "#2a2a31";
            ctx.fillRect(px, py, BLOCK - 1, BLOCK - 1);

            ctx.strokeStyle = "rgba(0,0,0,0.16)";
            ctx.lineWidth = 1;
            ctx.strokeRect(px + 0.5, py + 0.5, BLOCK - 2, BLOCK - 2);

            ctx.fillStyle = "rgba(255,255,255,0.012)";
            ctx.fillRect(px + 2, py + 2, BLOCK - 8, 2);
          }
        }
      }
    }

    function drawPiece() {
      if (!piece) return;
      piece.shape.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) drawCell(piece.x + x, piece.y + y, value);
        });
      });
    }

    function draw() {
      drawBoard();
      drawPiece();
    }

    function collide() {
      for (let y = 0; y < piece.shape.length; y++) {
        for (let x = 0; x < piece.shape[y].length; x++) {
          if (!piece.shape[y][x]) continue;

          const newX = piece.x + x;
          const newY = piece.y + y;

          if (
            newX < 0 ||
            newX >= COLS ||
            newY >= ROWS ||
            (newY >= 0 && board[newY][newX] !== 0)
          ) return true;
        }
      }
      return false;
    }

    function merge() {
      piece.shape.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) board[piece.y + y][piece.x + x] = value;
        });
      });
    }

    function rotate(matrix) {
      return matrix[0].map((_, i) => matrix.map(row => row[i]).reverse());
    }

    function rotatePiece() {
      if (gameOver || gameWon) return;

      const oldShape = piece.shape;
      const oldX = piece.x;

      piece.shape = rotate(piece.shape);

      if (collide()) {
        piece.x++;
        if (collide()) {
          piece.x -= 2;
          if (collide()) {
            piece.x = oldX;
            piece.shape = oldShape;
            return;
          }
        }
      }

      playImpact("rotate");
      draw();
    }

    function updateLevel() {
      const newLevel = Math.min(MAX_LEVEL, Math.floor(totalLines / LINES_PER_LEVEL) + 1);
      if (newLevel !== level) {
        level = newLevel;
        levelEl.textContent = level;
      }
      dropInterval = LEVEL_SPEEDS[level];
    }

    function showEndingScene() {
      endingOverlay.classList.remove("show");
      void endingOverlay.offsetWidth;
      endingOverlay.classList.add("show");
    }

    function clearLines() {
      let lines = 0;

      outer:
      for (let y = ROWS - 1; y >= 0; y--) {
        for (let x = 0; x < COLS; x++) {
          if (board[y][x] === 0) continue outer;
        }

        const row = board.splice(y, 1)[0].fill(0);
        board.unshift(row);
        lines++;
        y++;
      }

      if (lines > 0) {
        totalLines += lines;
        score += lines * 100 * level;
        linesEl.textContent = totalLines;
        scoreEl.textContent = score;
        updateLevel();
        playImpact("clear");

        if (level >= MAX_LEVEL && totalLines >= (MAX_LEVEL - 1) * LINES_PER_LEVEL) {
          gameWon = true;
          piece = null;
          messageEl.textContent = "พิชิตด่าน 23 สำเร็จ";
          playImpact("win");
          setTimeout(showEndingScene, 500);
        }
      }
    }

    function spawnPiece() {
      if (gameWon) return;
      piece = randomPiece();

      if (collide()) {
        gameOver = true;
        messageEl.textContent = "Game Over";
        playImpact("gameover");
      }
    }

    function moveDown() {
      if (gameOver || gameWon) return;

      piece.y++;

      if (collide()) {
        piece.y--;
        merge();
        playImpact("drop");
        clearLines();
        spawnPiece();
      }

      dropCounter = 0;
      draw();
    }

    function moveLeft() {
      if (gameOver || gameWon) return;
      piece.x--;
      if (collide()) {
        piece.x++;
      } else {
        playImpact("move");
      }
      draw();
    }

    function moveRight() {
      if (gameOver || gameWon) return;
      piece.x++;
      if (collide()) {
        piece.x--;
      } else {
        playImpact("move");
      }
      draw();
    }

    function update(time = 0) {
      const delta = time - lastTime;
      lastTime = time;
      dropCounter += delta;

      if (!gameOver && !gameWon && dropCounter > dropInterval) {
        moveDown();
      }

      draw();
      requestAnimationFrame(update);
    }

    function restartGame() {
      endingOverlay.classList.remove("show");
      board = createBoard();
      piece = null;
      score = 0;
      level = 1;
      totalLines = 0;
      gameOver = false;
      gameWon = false;
      dropCounter = 0;
      dropInterval = LEVEL_SPEEDS[1];
      lastTime = 0;

      scoreEl.textContent = "0";
      levelEl.textContent = "1";
      linesEl.textContent = "0";
      messageEl.textContent = "";

      spawnPiece();
      draw();
    }

    document.addEventListener("keydown", (e) => {
      ensureAudio();
      if (endingOverlay.classList.contains("show") && e.key === "Escape") {
        endingOverlay.classList.remove("show");
        return;
      }
      if (e.key === "ArrowLeft") moveLeft();
      else if (e.key === "ArrowRight") moveRight();
      else if (e.key === "ArrowDown") moveDown();
      else if (e.key === "ArrowUp") rotatePiece();
    });

    document.getElementById("leftBtn").addEventListener("click", () => {
      ensureAudio();
      moveLeft();
    });

    document.getElementById("rightBtn").addEventListener("click", () => {
      ensureAudio();
      moveRight();
    });

    document.getElementById("downBtn").addEventListener("click", () => {
      ensureAudio();
      moveDown();
    });

    document.getElementById("rotateBtn").addEventListener("click", () => {
      ensureAudio();
      rotatePiece();
    });

    document.getElementById("restartBtn").addEventListener("click", () => {
      ensureAudio();
      restartGame();
    });

    replayEndingBtn.addEventListener("click", () => {
      ensureAudio();
      showEndingScene();
    });

    restartFromEndingBtn.addEventListener("click", () => {
      ensureAudio();
      restartGame();
    });

    endingOverlay.addEventListener("click", (e) => {
      if (e.target === endingOverlay) {
        endingOverlay.classList.remove("show");
      }
    });

    soundBtn.addEventListener("click", () => {
      soundEnabled = !soundEnabled;
      soundBtn.textContent = soundEnabled ? "🔊 เสียง: เปิด" : "🔇 เสียง: ปิด";
      if (soundEnabled) ensureAudio();
    });

    document.body.addEventListener("touchstart", ensureAudio, { passive: true, once: true });
    document.body.addEventListener("click", ensureAudio, { once: true });

    restartGame();
    update();
  </script>
</body>
</html>
