<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tetris Nuteam</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #0d0d10;
      color: #f2f2f2;
      font-family: Arial, sans-serif;
      min-height: 100%;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 10px 10px 18px;
    }

    .wrap {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    h1 {
      margin: 4px 0 10px;
      font-size: 26px;
      letter-spacing: 0.5px;
      font-weight: 700;
    }

    .panel {
      background: linear-gradient(180deg, #1a1a1d, #111114);
      border: 1px solid #2f2f34;
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
    }

    .topbar {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .info {
      flex: 1;
      background: #18181c;
      border: 1px solid #2b2b31;
      border-radius: 12px;
      padding: 8px;
    }

    .label {
      font-size: 11px;
      color: #a7a7b0;
      margin-bottom: 4px;
    }

    .value {
      font-size: 18px;
      font-weight: bold;
      color: #ffffff;
    }

    .canvas-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto;
    }

    canvas {
      width: min(100%, 280px);
      height: auto;
      max-height: 54vh;
      background: #202025;
      border: 2px solid #3a3a40;
      border-radius: 12px;
      display: block;
      margin: 0 auto;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
    }

    .gameover {
      margin-top: 8px;
      min-height: 20px;
      color: #ffffff;
      font-size: 14px;
      font-weight: bold;
    }

    .controls {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 8px;
      background: #34343a;
      color: #ffffff;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(0,0,0,0.18);
    }

    button:active {
      transform: scale(0.98);
    }

    .wide {
      grid-column: span 3;
      background: #43434b;
    }

    .help {
      margin-top: 10px;
      color: #9a9aa3;
      font-size: 12px;
      line-height: 1.4;
    }

    @media (max-height: 740px) {
      h1 {
        font-size: 24px;
        margin: 2px 0 8px;
      }

      .panel {
        padding: 10px;
      }

      .topbar {
        margin-bottom: 8px;
      }

      .info {
        padding: 7px;
      }

      .value {
        font-size: 17px;
      }

      canvas {
        width: min(100%, 260px);
        max-height: 50vh;
      }

      button {
        padding: 11px 8px;
        font-size: 14px;
      }

      .controls {
        gap: 7px;
        margin-top: 10px;
      }

      .help {
        font-size: 11px;
        margin-top: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Tetris Nuteam</h1>

    <div class="panel">
      <div class="topbar">
        <div class="info">
          <div class="label">คะแนน</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="info">
          <div class="label">สถานะ</div>
          <div class="value" id="status">เล่นอยู่</div>
        </div>
      </div>

      <div class="canvas-wrap">
        <canvas id="game" width="300" height="600"></canvas>
      </div>

      <div class="gameover" id="message"></div>

      <div class="controls">
        <button id="leftBtn">◀ ซ้าย</button>
        <button id="rotateBtn">⟳ หมุน</button>
        <button id="rightBtn">ขวา ▶</button>
        <button class="wide" id="downBtn">▼ ลงเร็ว</button>
        <button class="wide" id="restartBtn">เริ่มใหม่</button>
      </div>

      <div class="help">
        คีย์บอร์ด: ← → ขยับ, ↑ หมุน, ↓ ลงเร็ว
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const statusEl = document.getElementById("status");
    const messageEl = document.getElementById("message");

    const COLS = 10;
    const ROWS = 20;
    const BLOCK = 30;

    const COLORS = {
      1: "#e7e7e7",
      2: "#d5d5d5",
      3: "#c2c2c2",
      4: "#afafaf",
      5: "#9c9c9c",
      6: "#898989",
      7: "#f4f4f4"
    };

    const SHAPES = [
      [[1,1,1,1]],
      [[2,2],[2,2]],
      [[0,3,0],[3,3,3]],
      [[0,4,4],[4,4,0]],
      [[5,5,0],[0,5,5]],
      [[6,0,0],[6,6,6]],
      [[0,0,7],[7,7,7]]
    ];

    let board;
    let piece;
    let score;
    let gameOver;
    let dropCounter;
    let dropInterval;
    let lastTime;

    function createBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    }

    function randomPiece() {
      const shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
      return {
        shape: shape.map(row => [...row]),
        x: Math.floor(COLS / 2) - Math.ceil(shape[0].length / 2),
        y: 0
      };
    }

    function drawCell(x, y, value) {
      ctx.fillStyle = COLORS[value] || "#ffffff";
      ctx.fillRect(x * BLOCK, y * BLOCK, BLOCK - 1, BLOCK - 1);
    }

    function drawBoard() {
      ctx.fillStyle = "#202025";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          if (board[y][x]) {
            drawCell(x, y, board[y][x]);
          } else {
            ctx.fillStyle = "#27272d";
            ctx.fillRect(x * BLOCK, y * BLOCK, BLOCK - 1, BLOCK - 1);
          }
        }
      }
    }

    function drawPiece() {
      piece.shape.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) {
            drawCell(piece.x + x, piece.y + y, value);
          }
        });
      });
    }

    function draw() {
      drawBoard();
      if (!gameOver || piece) {
        drawPiece();
      }
    }

    function collide() {
      for (let y = 0; y < piece.shape.length; y++) {
        for (let x = 0; x < piece.shape[y].length; x++) {
          if (!piece.shape[y][x]) continue;

          const newX = piece.x + x;
          const newY = piece.y + y;

          if (
            newX < 0 ||
            newX >= COLS ||
            newY >= ROWS ||
            (newY >= 0 && board[newY][newX] !== 0)
          ) {
            return true;
          }
        }
      }
      return false;
    }

    function merge() {
      piece.shape.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) {
            board[piece.y + y][piece.x + x] = value;
          }
        });
      });
    }

    function rotate(matrix) {
      return matrix[0].map((_, i) => matrix.map(row => row[i]).reverse());
    }

    function rotatePiece() {
      if (gameOver) return;

      const oldShape = piece.shape;
      const oldX = piece.x;

      piece.shape = rotate(piece.shape);

      if (collide()) {
        piece.x++;
        if (collide()) {
          piece.x -= 2;
          if (collide()) {
            piece.x = oldX;
            piece.shape = oldShape;
          }
        }
      }

      draw();
    }

    function clearLines() {
      let lines = 0;

      outer:
      for (let y = ROWS - 1; y >= 0; y--) {
        for (let x = 0; x < COLS; x++) {
          if (board[y][x] === 0) {
            continue outer;
          }
        }

        const row = board.splice(y, 1)[0].fill(0);
        board.unshift(row);
        lines++;
        y++;
      }

      if (lines > 0) {
        score += lines * 100;
        scoreEl.textContent = score;
      }
    }

    function spawnPiece() {
      piece = randomPiece();

      if (collide()) {
        gameOver = true;
        statusEl.textContent = "จบเกม";
        messageEl.textContent = "Game Over";
      }
    }

    function moveDown() {
      if (gameOver) return;

      piece.y++;

      if (collide()) {
        piece.y--;
        merge();
        clearLines();
        spawnPiece();
      }

      dropCounter = 0;
      draw();
    }

    function moveLeft() {
      if (gameOver) return;

      piece.x--;
      if (collide()) piece.x++;
      draw();
    }

    function moveRight() {
      if (gameOver) return;

      piece.x++;
      if (collide()) piece.x--;
      draw();
    }

    function update(time = 0) {
      const delta = time - lastTime;
      lastTime = time;
      dropCounter += delta;

      if (!gameOver && dropCounter > dropInterval) {
        moveDown();
      }

      draw();
      requestAnimationFrame(update);
    }

    function restartGame() {
      board = createBoard();
      score = 0;
      gameOver = false;
      dropCounter = 0;
      dropInterval = 650;
      lastTime = 0;
      scoreEl.textContent = "0";
      statusEl.textContent = "เล่นอยู่";
      messageEl.textContent = "";
      spawnPiece();
      draw();
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") moveLeft();
      else if (e.key === "ArrowRight") moveRight();
      else if (e.key === "ArrowDown") moveDown();
      else if (e.key === "ArrowUp") rotatePiece();
    });

    document.getElementById("leftBtn").addEventListener("click", moveLeft);
    document.getElementById("rightBtn").addEventListener("click", moveRight);
    document.getElementById("downBtn").addEventListener("click", moveDown);
    document.getElementById("rotateBtn").addEventListener("click", rotatePiece);
    document.getElementById("restartBtn").addEventListener("click", restartGame);

    restartGame();
    update();
  </script>
</body>
</html>
